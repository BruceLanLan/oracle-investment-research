<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <clipPath id="circle"><circle cx="60" cy="52" r="45"/></clipPath>
  </defs>
  <circle cx="60" cy="52" r="45" fill="#bbf7d0" stroke="#000" stroke-width="3"/>
  <!-- Hair (white, thin, old-school) -->
  <path d="M36,38 Q40,24 60,22 Q80,24 84,38" fill="#f0f0f0" stroke="#000" stroke-width="2.5"/>
  <path d="M36,38 L36,44" fill="none" stroke="#000" stroke-width="2"/>
  <path d="M84,38 L84,44" fill="none" stroke="#000" stroke-width="2"/>
  <!-- Face -->
  <ellipse cx="60" cy="52" rx="20" ry="24" fill="#f0c898" stroke="#000" stroke-width="2.5"/>
  <!-- Old-school round glasses -->
  <circle cx="50" cy="46" r="9" fill="none" stroke="#000" stroke-width="2"/>
  <circle cx="70" cy="46" r="9" fill="none" stroke="#000" stroke-width="2"/>
  <line x1="59" y1="46" x2="61" y2="46" stroke="#000" stroke-width="2"/>
  <!-- Eyes -->
  <circle cx="50" cy="46" r="2.5" fill="#000"/>
  <circle cx="70" cy="46" r="2.5" fill="#000"/>
  <!-- Eyebrows -->
  <path d="M43,37 Q50,34 57,37" fill="none" stroke="#555" stroke-width="2"/>
  <path d="M63,37 Q70,34 77,37" fill="none" stroke="#555" stroke-width="2"/>
  <!-- Nose -->
  <path d="M58,52 Q60,58 62,52" fill="none" stroke="#000" stroke-width="2"/>
  <!-- Thoughtful mouth -->
  <line x1="50" y1="63" x2="70" y2="63" stroke="#000" stroke-width="2"/>
