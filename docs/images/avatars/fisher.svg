  <rect x="28" y="72" width="64" height="28" rx="6" fill="#4ade80" stroke="#000" stroke-width="2.5"/>
  <path d="M44,72 L60,84 L76,72" fill="none" stroke="#000" stroke-width="2"/>
  <line x1="60" y1="72" x2="60" y2="84" stroke="#000" stroke-width="1.5"/>
  <!-- Name label -->
  <rect x="5" y="98" width="110" height="18" rx="4" fill="#22c55e" stroke="#000" stroke-width="2"/>
  <text x="60" y="111" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="9" font-weight="bold" fill="#fff">Fisher</text>
