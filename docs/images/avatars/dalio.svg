<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <clipPath id="circle"><circle cx="60" cy="52" r="45"/></clipPath>
  </defs>
  <circle cx="60" cy="52" r="45" fill="#e9d5ff" stroke="#000" stroke-width="3"/>
  <!-- Bald head -->
  <ellipse cx="60" cy="52" rx="20" ry="24" fill="#f5d0a9" stroke="#000" stroke-width="2.5"/>
  <!-- No hair, just a bit of shadow -->
  <ellipse cx="60" cy="32" rx="18" ry="5" fill="#e8c898" stroke="#000" stroke-width="1.5"/>
  <!-- Eyebrows -->
  <path d="M44,40 Q52,36 56,40" fill="none" stroke="#333" stroke-width="3"/>
  <path d="M64,40 Q68,36 76,40" fill="none" stroke="#333" stroke-width="3"/>
  <!-- Eyes -->
  <circle cx="50" cy="46" r="3" fill="#000"/>
  <circle cx="70" cy="46" r="3" fill="#000"/>
  <!-- Glasses -->
  <circle cx="50" cy="46" r="8" fill="none" stroke="#000" stroke-width="2"/>
  <circle cx="70" cy="46" r="8" fill="none" stroke="#000" stroke-width="2"/>
  <line x1="58" y1="46" x2="62" y2="46" stroke="#000" stroke-width="2"/>
  <!-- Nose -->
  <path d="M58,52 Q60,58 62,52" fill="none" stroke="#000" stroke-width="2"/>
  <!-- Mouth -->
  <path d="M50,62 Q60,68 70,62" fill="none" stroke="#000" stroke-width="2"/>
  <!-- Suit -->
  <rect x="28" y="72" width="64" height="28" rx="6" fill="#4c1d95" stroke="#000" stroke-width="2.5"/>
  <path d="M45,72 L60,84 L75,72" fill="none" stroke="#000" stroke-width="2"/>
  <line x1="60" y1="72" x2="60" y2="84" stroke="#000" stroke-width="1.5"/>
  <polygon points="56,84 64,84 62,98 58,98" fill="#a78bfa" stroke="#000" stroke-width="1.5"/>
  <!-- Name label -->
  <rect x="5" y="98" width="110" height="18" rx="4" fill="#7c3aed" stroke="#000" stroke-width="2"/>
  <text x="60" y="111" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="9" font-weight="bold" fill="#fff">Dalio</text>
</svg>