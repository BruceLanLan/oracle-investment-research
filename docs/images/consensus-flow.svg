  <text x="850" y="225" font-family="Arial" font-size="8" fill="#94a3b8">步骤 3</text>
  <g transform="translate(50,235)"><rect width="140" height="14" rx="3" fill="#f5f3ff" stroke="#7c3aed" stroke-width="0.6"/><text x="70" y="12" text-anchor="middle" font-family="Arial" font-size="6" fill="#5b21b6">行业权重</text></g>
  <g transform="translate(200,235)"><rect width="140" height="14" rx="3" fill="#f5f3ff" stroke="#7c3aed" stroke-width="0.6"/><text x="70" y="12" text-anchor="middle" font-family="Arial" font-size="6" fill="#5b21b6">机制路由</text></g>
  <g transform="translate(350,235)"><rect width="140" height="14" rx="3" fill="#f5f3ff" stroke="#7c3aed" stroke-width="0.6"/><text x="70" y="12" text-anchor="middle" font-family="Arial" font-size="6" fill="#5b21b6">滚动IC权重</text></g>
  <g transform="translate(500,235)"><rect width="140" height="14" rx="3" fill="#f5f3ff" stroke="#7c3aed" stroke-width="0.6"/><text x="70" y="12" text-anchor="middle" font-family="Arial" font-size="6" fill="#5b21b6">多样性惩罚</text></g>
  <g transform="translate(650,235)"><rect width="140" height="14" rx="3" fill="#f5f3ff" stroke="#7c3aed" stroke-width="0.6"/><text x="70" y="12" text-anchor="middle" font-family="Arial" font-size="6" fill="#5b21b6">Meta Model</text></g>
  <g transform="translate(800,235)"><rect width="130" height="14" rx="3" fill="#f5f3ff" stroke="#7c3aed" stroke-width="0.6"/><text x="65" y="12" text-anchor="middle" font-family="Arial" font-size="6" fill="#5b21b6">卡尔马校准</text></g>
  <line x1="500" y1="255" x2="500" y2="274" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 4 -->
  <rect x="30" y="274" width="440" height="48" rx="6" fill="#fff" stroke="#d97706" stroke-width="1.5"/>
  <text x="50" y="299" font-family="Arial" font-size="10" font-weight="600" fill="#92400e">风控裁决</text>
  <text x="50" y="314" font-family="Arial" font-size="8" fill="#64748b">Kelly仓位 / Calmar / VaR / 熔断</text>
  <rect x="510" y="274" width="440" height="48" rx="6" fill="#fff" stroke="#059669" stroke-width="1.5"/>
  <text x="530" y="299" font-family="Arial" font-size="10" font-weight="600" fill="#065f46">最终输出</text>
  <text x="530" y="314" font-family="Arial" font-size="8" fill="#64748b">BULLISH/NEUTRAL/BEARISH / 评分 / 仓位建议</text>
  <circle cx="50" cy="342" r="3" fill="#22c55e"/><text x="60" y="346" font-family="Arial" font-size="8" fill="#64748b">Augur Dashboard</text>
  <circle cx="230" cy="342" r="3" fill="#3b82f6"/><text x="240" y="346" font-family="Arial" font-size="8" fill="#64748b">Hermes Web UI</text>
  <circle cx="430" cy="342" r="3" fill="#a855f7"/><text x="440" y="346" font-family="Arial" font-size="8" fill="#64748b">Skill对话</text>
  <circle cx="600" cy="342" r="3" fill="#f59e0b"/><text x="610" y="346" font-family="Arial" font-size="8" fill="#64748b">Telegram/Slack</text>
  <circle cx="810" cy="342" r="3" fill="#ef4444"/><text x="820" y="346" font-family="Arial" font-size="8" fill="#64748b">API</text>
</svg>
