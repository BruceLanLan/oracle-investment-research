  <text x="850" y="137" font-family="Arial" font-size="8" fill="#94a3b8">步骤 2</text>
  <g transform="translate(50,148)"><rect width="100" height="22" rx="4" fill="#dbeafe" stroke="#1e293b" stroke-width="1"/><text x="50" y="16" text-anchor="middle" font-family="Arial" font-size="7" font-weight="600" fill="#1e40af">Buffett</text></g>
  <g transform="translate(158,148)"><rect width="100" height="22" rx="4" fill="#dbeafe" stroke="#1e293b" stroke-width="1"/><text x="50" y="16" text-anchor="middle" font-family="Arial" font-size="7" font-weight="600" fill="#1e40af">Graham</text></g>
  <g transform="translate(266,148)"><rect width="100" height="22" rx="4" fill="#dcfce7" stroke="#1e293b" stroke-width="1"/><text x="50" y="16" text-anchor="middle" font-family="Arial" font-size="7" font-weight="600" fill="#166534">Dalio</text></g>
  <g transform="translate(374,148)"><rect width="100" height="22" rx="4" fill="#f3e8ff" stroke="#1e293b" stroke-width="1"/><text x="50" y="16" text-anchor="middle" font-family="Arial" font-size="7" font-weight="600" fill="#4c1d95">Aschenbrenner</text></g>
  <g transform="translate(482,148)"><rect width="100" height="22" rx="4" fill="#ffedd5" stroke="#1e293b" stroke-width="1"/><text x="50" y="16" text-anchor="middle" font-family="Arial" font-size="7" font-weight="600" fill="#9a3412">大宇</text></g>
  <g transform="translate(590,148)"><rect width="100" height="22" rx="4" fill="#fce7e7" stroke="#1e293b" stroke-width="1"/><text x="50" y="16" text-anchor="middle" font-family="Arial" font-size="7" font-weight="600" fill="#991b1b">段永平</text></g>
  <g transform="translate(698,148)"><rect width="100" height="22" rx="4" fill="#fef3c7" stroke="#1e293b" stroke-width="1"/><text x="50" y="16" text-anchor="middle" font-family="Arial" font-size="7" font-weight="600" fill="#92400e">Thiel</text></g>
  <g transform="translate(806,148)"><rect width="100" height="22" rx="4" fill="#f8fafc" stroke="#1e293b" stroke-width="0.8"/><text x="50" y="16" text-anchor="middle" font-family="Arial" font-size="7" fill="#64748b">+10 more</text></g>
  <line x1="500" y1="182" x2="500" y2="200" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 3 -->
  <rect x="30" y="200" width="920" height="55" rx="6" fill="#fff" stroke="#7c3aed" stroke-width="1.5"/>
