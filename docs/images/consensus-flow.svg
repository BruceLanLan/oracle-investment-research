<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 360" width="1000" height="360">
  <defs>
    <pattern id="bg-dots" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="0.8" fill="#cbd5e1" opacity="0.3"/>
    </pattern>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#94a3b8"/>
    </marker>
  </defs>
  <rect width="1000" height="360" fill="#f8f6f0"/>
  <rect width="1000" height="360" fill="url(#bg-dots)"/>
  <rect x="8" y="8" width="984" height="344" rx="10" fill="none" stroke="#1e293b" stroke-width="2"/>
  <text x="500" y="36" text-anchor="middle" font-family="Arial" font-size="16" font-weight="700" fill="#0f172a">共识决策流程</text>

  <!-- Step 1 -->
  <rect x="30" y="52" width="920" height="40" rx="6" fill="#fff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="50" y="77" font-family="Arial" font-size="11" font-weight="600" fill="#1e40af">用户输入</text>
  <text x="140" y="77" font-family="Arial" font-size="10" fill="#64748b">股票代码 / 分析问题 / 对话指令</text>
  <text x="850" y="77" font-family="Arial" font-size="8" fill="#94a3b8">步骤 1</text>
  <line x1="500" y1="92" x2="500" y2="112" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 2 -->
  <rect x="30" y="112" width="920" height="70" rx="6" fill="#fff" stroke="#059669" stroke-width="1.5"/>
